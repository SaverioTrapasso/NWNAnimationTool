; Retargeting config for an FF14-style rig (right-hand-side bone names below
; follow that convention). Maps each NWN dummy node (left side) to the
; source bone it should copy rotation from (right side). Edit freely and
; save — this file has no glb baked into it; import whatever model+animation
; file matches this bone naming via "Import model" in the Retarget panel.
;
; Leave a value empty ("") to skip that NWN node during bake (it keeps
; whatever pose it already has instead of being driven by the source).
;
; Known issue with the original FF14 test rig this was built against: its
; right hand had no proper rotation joint, only a tip/attachment marker
; ("n_hte_r") unlike the left hand's real bone ("j_te_l"). If your source
; rig has the same asymmetry, the baked right hand may look dead/un-rotated.

[meta]
prefab_name = "ff14"
source_fps = 30.0
root_scale = 1.1

[bone_map]
rootdummy = "n_hara"
pelvis_g = "j_kosi"
torso_g = "j_sebo_c"
neck_g = "j_kubi"
head_g = "j_kao"
rbicep_g = "j_ude_a_r"
rforearm_g = "j_ude_b_r"
rhand_g = "n_hte_r"
lbicep_g = "j_ude_a_l"
lforearm_g = "j_ude_b_l"
lhand_g = "j_te_l"
rthigh_g = "j_asi_a_r"
rshin_g = "j_asi_c_r"
rfoot_g = "j_asi_d_r"
lthigh_g = "j_asi_a_l"
lshin_g = "j_asi_c_l"
lfoot_g = "j_asi_d_l"

[rotation_offset]
rootdummy = "0.000,180.000,0.000"
pelvis_g = "0.000,0.000,0.000"
torso_g = "0.000,0.000,0.000"
neck_g = "0.000,0.000,0.000"
head_g = "0.000,0.000,0.000"
rbicep_g = "0.000,0.000,-45.000"
rforearm_g = "0.000,0.000,0.000"
rhand_g = "0.000,0.000,0.000"
lbicep_g = "0.000,0.000,45.000"
lforearm_g = "0.000,0.000,0.000"
lhand_g = "0.000,0.000,0.000"
rthigh_g = "0.000,0.000,0.000"
rshin_g = "0.000,0.000,0.000"
rfoot_g = "0.000,0.000,0.000"
lthigh_g = "0.000,0.000,0.000"
lshin_g = "0.000,0.000,0.000"
lfoot_g = "0.000,0.000,0.000"
